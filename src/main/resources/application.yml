server:
  port: ${PORT:8080}

spring:
  application:
    name: neurolive-realtime-service
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

realtime:
  websocket:
    endpoint: ${WS_ENDPOINT:/ws/device}
    allowed-origins: ${WS_ALLOWED_ORIGINS:*}
  security:
    device-tokens:
      ESP32_001: ${DEVICE_TOKEN_ESP32_001:abc123}
      ESP32_002: ${DEVICE_TOKEN_ESP32_002:def456}
  heartbeat:
    timeout-seconds: ${HEARTBEAT_TIMEOUT_SECONDS:15}
    check-interval-millis: ${HEARTBEAT_CHECK_INTERVAL_MILLIS:5000}
  telemetry:
    history-limit: ${TELEMETRY_HISTORY_LIMIT:20}
  integration:
    base-url: ${BACKEND_BASE_URL:}

logging:
  level:
    com.neurolive.realtime: INFO
